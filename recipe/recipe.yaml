schema_version: 1

context:
  name: python-build
  version: "1.4.3"
  python_min: "3.9"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/b/build/build-${{ version }}.tar.gz
  sha256: 5aa4231ae0e807efdf1fd0623e07366eca2ab215921345a2e38acdd5d0fa0a74

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv
  python:
    entry_points:
      - python-build = build.__main__:entrypoint
      - pyproject-build = build.__main__:entrypoint

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - flit-core >=3.11
  run:
    - python >=${{ python_min }}
    - colorama
    - importlib-metadata >=4.6
    - packaging >=24.0
    - pyproject_hooks
    - tomli >=1.1.0
  run_constraints:
    - build <0

tests:
  - python:
      imports:
        - build
      pip_check: true
      python_version: ${{ python_min }}
  - requirements:
      run:
        - python ${{ python_min }}.*
    script:
      - python-build --help
      - pyproject-build --help

about:
  license: MIT
  license_file: LICENSE
  summary: A simple, correct PEP 517 build frontend
  homepage: https://github.com/pypa/build
  documentation: https://pypa-build.readthedocs.io

extra:
  recipe-maintainers:
    - ocefpaf
    - henryiii
